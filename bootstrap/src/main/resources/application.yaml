spring:
  application:
    name: pfct
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pfct}
    username: ${DB_USERNAME:pfct}
    password: ${DB_PASSWORD:pfct}
  jpa:
    hibernate:
      # 스키마는 Flyway 가 관리한다. JPA 는 엔티티-스키마 일치 여부만 검증(validate)한다.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug
